# workflow do testowania end-to-end z użyciem Playwright uruchamianego na każdym pushu i pull requestcie. 
# Testy są wykonywane na różnych warstwach aplikacji

name: CI - Playwright Cross-Layer Testing

# sekcja, która definiuje, kiedy workflow ma być uruchamiany.

on:
 push:
 pull_request:

# sekcja definiująca zadania do wykonania w ramach workflow.
jobs:

# zadanie testowe:
  test:
# runs-on -  sekcja, która definiuje, na jakim systemie (OS) ma być uruchamiane zadanie. 
    runs-on: ubuntu-latest